<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de Contraseña</title>
    <style>
        /* Estilos base y fuentes seguras para correos */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            color: #c62828;
            margin-bottom: 20px;
        }

        p {
            color: #333333;
            line-height: 1.6;
            font-size: 16px;
        }

        a.button {
            display: inline-block;
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 12px 24px;
            background-color: #1565c0;
            color: #ffffff !important; /* Fuerza el color blanco en clientes de correo */
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #0d47a1;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #555555;
            border-top: 1px solid #eeeeee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Reset Request</h2>
        
        <p>Hello <span th:text="${name}">User</span>,</p>
        
        <p>We received a request to reset your password. Please click the button below to reset it:</p>
        
        <a th:href="${resetLink}" class="button">Reset Password</a>
        
        <p>If you did not request this, please ignore this email.</p>
        
        <div class="footer">
            &copy; 2026 Fintech Bank | Security First
        </div>
    </div>

</body>
</html>
