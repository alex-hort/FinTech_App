name: Backend CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fintech_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      LOCAL_DB_URL: "jdbc:mysql://localhost:3306/fintech_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      LOCAL_DB_USERNAME: root
      LOCAL_DB_PASSWORD: root
      PORT: 8090
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION: 86400000
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

    steps:
      - uses: actions/checkout@v5

      - name: Configurar JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Ejecutar pruebas
        run: ./mvnw -B verify
